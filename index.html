<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beenish | Portfolio</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e0f7fa;
    overflow: hidden; /* No scroll */
}

.container {
    display: flex;
    width: 100%;
    height: 100vh; /* Full viewport height */
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #006064, #00bfa5);
    color: white;
}

/* Left side */
.left {
    text-align: center;
    margin-right: 50px;
}

.left img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid #7CFC00; /* Parrot green */
    object-fit: cover;
    margin-bottom: 20px;
}

.left h1 {
    color: #7CFC00; /* Parrot green */
    margin: 10px 0;
}

.left p {
    font-size: 18px;
    color: #b2ebf2;
}

/* Right side */
.right {
    max-width: 500px;
}

.right h2 {
    border-bottom: 2px solid #7CFC00;
    display: inline-block;
    padding-bottom: 5px;
    margin-bottom: 10px;
}

.right p {
    color: #ffffff;
    line-height: 1.5;
    margin-bottom: 15px;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 10px 20px;
    margin-right: 10px;
    background: #7CFC00;
    color: #004d40;
    font-weight: bold;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.btn:hover {
    background: #004d40;
    color: #7CFC00;
}
</style>
</head>
<body>

<div class="container">

    <div class="left">
        <img src="https://randomuser.me/api/portraits/women/65.jpg" alt="Profile Picture">
        <h1>Beenish</h1>
        <p>Web Developer | Student</p>
    </div>

    <div class="right">
        <h2>About Me</h2>
        <p>Hello! I am <span style="color:#7CFC00; font-weight:bold;">Beenish</span>. I create web projects and learn new web technologies.</p>

        <h2>Skills</h2>
        <p>HTML | CSS | JavaScript | GitHub | Responsive Design</p>

        <h2>Contact</h2>
        <p>Email: beenish@email.com<br>Phone: +92 300 0000000</p>

        <a href="#" class="btn">View Projects</a>
        <a href="#" class="btn">Contact Me</a>
    </div>

</div>

</body>
</html>
