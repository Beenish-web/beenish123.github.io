<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beenish | Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

/* Header */
header {
    background: #333;
    padding: 30px;
    color: white;
}

header h1 {
    margin: 0;
    color: #7CFC00; /* Parrot green */
}

header p {
    color: #ddd;
}

/* Sections */
section {
    padding: 20px;
}

.card {
    background: white;
    margin: 15px auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

/* Text */
p {
    color: black;
}

/* Button */
.btn {
    display: inline-block;
    padding: 10px 20px;
    background: #7CFC00;
    color: black;
    text-decoration: none;
    border-radius: 5px;
    margin-top: 10px;
    transition: 0.3s;
}

.btn:hover {
    background: black;
    color: #7CFC00;
}

/* Footer */
footer {
    background: #333;
    color: white;
    padding: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Beenish</h1>
    <p>Student | Future Web Developer</p>
</header>

<section>

<div class="card">
    <h2>About Me</h2>
    <p>Hello! I am <b style="color:#7CFC00;">Beenish</b>, a student exploring web development.</p>
</div>

<div class="card">
    <h2>My Skills</h2>
    <p>HTML | CSS | JavaScript | GitHub</p>
</div>

<div class="card">
    <h2>My Projects</h2>
    <p>Portfolio Website (This site)</p>
    <a href="#" class="btn">View Project</a>
</div>

<div class="card">
    <h2>Contact</h2>
    <p>Email: inocentgirl417@gmail.com</p>
    <a href="#" class="btn">Contact Me</a>
</div>

</section>

<footer>
    <p>© 2026 Beenish</p>
</footer>

</body>
</html>
